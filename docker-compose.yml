services:
  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: articledesk-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/articles"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

